# Build Jekyll and deploy to Codeberg Pages (preview URL during pre-cutover).
# GitHub Pages continues to serve the custom domain until DNS cutover.
name: pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    if: ${{ forgejo.ref == 'refs/heads/main' }}
    # Hosted Codeberg runners: https://codeberg.org/actions/meta
    # medium = 10m / 8G — enough headroom for first-time gem install + Jekyll.
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Setup Ruby
        uses: https://github.com/ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      # git-pages/action runs in Docker; act copies the workspace into that
      # container. vendor/bundle from bundler-cache is nested too deep for docker cp.
      - name: Remove vendor before deploy
        run: rm -rf vendor

      - name: Deploy to Codeberg Pages
        uses: https://codeberg.org/git-pages/action@v2
        with:
          site: https://${{ forgejo.repository_owner }}.codeberg.page/${{ forgejo.repository }}/
          token: ${{ forgejo.token }}
          source: _site/
