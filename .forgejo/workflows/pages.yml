# Build Jekyll and deploy to Codeberg Pages (preview URL during pre-cutover).
# GitHub Pages continues to serve the custom domain until DNS cutover.
name: pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    if: ${{ forgejo.ref == 'refs/heads/main' }}
    # Hosted Codeberg runners: https://codeberg.org/actions/meta
    runs-on: codeberg-small
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      # Keep gems outside the workspace. git-pages/action is a Docker action;
      # act copies the whole workspace into that container and fails with
      # "directories nested too deep" when vendor/bundle is present.
      - name: Setup Ruby
        uses: https://github.com/ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false

      - name: Install gems and build site
        run: |
          bundle config set --local path /tmp/bundle
          bundle install --jobs 4
          bundle exec jekyll build
          rm -rf vendor .bundle

      - name: Deploy to Codeberg Pages
        uses: https://codeberg.org/git-pages/action@v2
        with:
          # Use repository.name (not repository / owner/repo) — a slash in the
          # site path makes git-pages return "directories nested too deep".
          site: https://${{ forgejo.repository_owner }}.codeberg.page/${{ forgejo.event.repository.name }}/
          token: ${{ forgejo.token }}
          source: _site/
